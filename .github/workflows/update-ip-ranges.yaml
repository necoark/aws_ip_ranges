name: Update aws_ip_ranges
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Copy files to runner
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x' #последний доступный патч

      - name: Run parser
        run: dotnet run --project src/AWS/

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aws_ip_ranges.txt
          git diff --cached --quiet && echo "No changes in ip_ranges" && exit 0
          git commit -m "update aws_ip_ranges.txt"
          git push
